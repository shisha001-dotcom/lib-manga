<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết truyện</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="detail-container"></div>

  <script>
    const STORAGE_KEY = 'manga_collection_v2';

    function getBooks() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function getBookId() {
      const params = new URLSearchParams(window.location.search);
      return Number(params.get('id'));
    }

    function renderDetail() {
      const books = getBooks();
      const id = getBookId();

      const book = books.find(b => b.id === id);

      const container = document.getElementById('detail-container');

      if (!book) {
        container.innerHTML = '<h2>Không tìm thấy truyện</h2>';
        return;
      }

      container.innerHTML = `
        <div class="detail-page">
          <img src="${book.cover}" style="max-width:300px">

          <h1>${book.name}</h1>

          <p>${book.synopsis || ''}</p>

          <h3>Số tập hiện có:</h3>

          <div>
            ${book.volumes.map(v =>
              `<span class="vol-chip-detail have">${v}</span>`
            ).join('')}
          </div>

          <br>

          <button onclick="history.back()">
            ← Quay lại
          </button>
        </div>
      `;
    }

    renderDetail();
  </script>

</body>
</html>
