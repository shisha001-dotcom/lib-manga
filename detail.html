<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Chi tiết truyện</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="detail-container"></div>

  <script>
    const STORAGE_KEY = 'manga_collection_v2';

    function getBooks() {
      return JSON.parse(
        localStorage.getItem(STORAGE_KEY) || '[]'
      );
    }

    function getBookId() {
      const params = new URLSearchParams(window.location.search);
      return Number(params.get('id'));
    }

    function renderDetail() {

      const books = getBooks();

      const id = getBookId();

      const book = books.find(b => b.id === id);

      const container =
        document.getElementById('detail-container');

      if (!book) {

        container.innerHTML = `
          <div class="detail-page">
            <h1>Không tìm thấy truyện</h1>
          </div>
        `;

        return;
      }

      container.innerHTML = `
        <div class="detail-page">

          <div class="top-info">

            <img
              class="main-cover"
              src="${book.cover}"
              alt="${book.name}"
            >

            <div class="book-info">

              <h1 class="book-title">
                ${book.name}
              </h1>

              <p class="book-desc">
                ${book.synopsis || 'Chưa có mô tả'}
              </p>

              <button
                class="back-btn"
                onclick="history.back()"
              >
                ← Quay lại
              </button>

            </div>

          </div>

          <h2 class="section-title">
            Danh sách tập
          </h2>

          <div class="volume-grid">

            ${(book.volumes || []).map(v => {

              // hỗ trợ dữ liệu cũ dạng [1,2,3]
              const volume =
                typeof v === 'number'
                  ? {
                      number: v,
                      owned: true,
                      cover: ''
                    }
                  : v;

              return `
                <div class="volume-card ${volume.owned ? 'owned' : 'missing'}">

                  <div class="badge ${volume.owned ? 'owned-badge' : 'missing-badge'}">
                    ${volume.owned ? 'Đã có' : 'Chưa có'}
                  </div>

                  <img
                    src="${volume.cover || 'https://placehold.co/300x420?text=No+Cover'}"
                    alt="Tập ${volume.number}"
                    loading="lazy"
                  >

                  <div class="volume-info">
                    Tập ${volume.number}
                  </div>

                </div>
              `;
            }).join('')}

          </div>

          ${
            !book.volumes || book.volumes.length === 0
            ? `
              <div class="empty-state">
                Chưa có dữ liệu tập truyện
              </div>
            `
            : ''
          }

        </div>
      `;
    }

    renderDetail();
  </script>

</body>
</html>
