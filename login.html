<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Kho Sách</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
  <div class="login-wrap">

    <!-- Left panel -->
    <div class="login-aside">
      <div>
        <div class="login-aside-logo">📚</div>
        <div class="login-aside-title">Kho Sách</div>
        <div class="login-aside-sub">Quản lý bộ sưu tập manga của bạn — theo dõi tập, wishlist, và tiến độ sưu tầm.</div>
        <div class="login-aside-decor">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="login-aside-footer">Chỉ dành cho quản trị viên có tài khoản.</div>
    </div>

    <!-- Right panel: form -->
    <div class="login-form-area">
      <div class="login-form-title">Đăng nhập</div>
      <div class="login-form-sub">Nhập thông tin tài khoản của bạn</div>

      <div class="login-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" placeholder="username..." autocomplete="username">
      </div>

      <div class="login-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="mật khẩu..." autocomplete="current-password">
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">Đăng nhập</button>

      <div class="login-error" id="loginError"></div>
      <div class="login-success" id="loginSuccess"></div>

      <div class="login-user-info" id="userInfo">
        <div class="login-user-name" id="userInfoName"></div>
        <div class="login-user-meta">
          <span id="userInfoRole"></span>
          <span>·</span>
          <span id="userInfoUsername"></span>
        </div>
      </div>

      <a href="index.html" class="login-back">← Quay lại trang chủ</a>
    </div>

  </div>
</div>

<script>
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

const SUPABASE_URL = "https://dklfwlgpomnrmxmbjpat.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrbGZ3bGdwb21ucm14bWJqcGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDQ5MDAsImV4cCI6MjA5NDA4MDkwMH0.sy8zDIdh9RBhl9TOqg6PnfTehqtV7VcFQSaSPoc4MoI";

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  const successEl = document.getElementById('loginSuccess');

  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  document.getElementById('userInfo').style.display = 'none';

  if (!username || !password) {
    errorEl.textContent = 'Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.';
    errorEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>Đang xác thực...';

  try {
    const passwordHash = await sha256(password);
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/admin_users?username=eq.${encodeURIComponent(username)}&select=*`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error('Lỗi kết nối đến máy chủ.');
    const data = await res.json();
    if (!data || data.length === 0) {
      errorEl.textContent = 'Tên đăng nhập không tồn tại.';
      errorEl.style.display = 'block'; return;
    }
    const user = data[0];
    if (user.password_hash !== passwordHash) {
      errorEl.textContent = 'Mật khẩu không đúng.';
      errorEl.style.display = 'block'; return;
    }

    fetch(`${SUPABASE_URL}/rest/v1/admin_users?id=eq.${user.id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ last_login: new Date().toISOString() })
    }).catch(() => {});

    sessionStorage.setItem('admin_user', JSON.stringify({
      id: user.id, username: user.username, display_name: user.display_name, role: user.role
    }));

    successEl.textContent = `Xin chào, ${user.display_name || user.username}! Đang chuyển hướng...`;
    successEl.style.display = 'block';

    document.getElementById('userInfoName').textContent = user.display_name || user.username;
    document.getElementById('userInfoUsername').textContent = '@' + user.username;
    const roleEl = document.getElementById('userInfoRole');
    roleEl.className = 'role-badge role-' + user.role;
    roleEl.textContent = user.role === 'superadmin' ? 'Super Admin' : 'Editor';
    document.getElementById('userInfo').style.display = 'block';

    setTimeout(() => { window.location.href = 'index.html'; }, 1400);

  } catch (err) {
    errorEl.textContent = err.message || 'Đã xảy ra lỗi. Vui lòng thử lại.';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Đăng nhập';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
