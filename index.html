<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kho Sách</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Thư viện</div>
        <div class="topbar-sub" id="topbarSub">Đang tải...</div>
      </div>
      <div class="topbar-actions">
        <input type="text" id="searchInput" placeholder="🔍 Tìm...">
        <button id="adminBtn" class="btn-primary" onclick="openAdminPanel()" style="display:none;">⚙️ Quản lý</button>
      </div>
    </div>

    <section>
      <div class="section-head">
        <h2>📖 Chưa đủ bộ</h2>
        <span class="section-count" id="countReading">0</span>
      </div>
      <div id="readingShelf" class="book-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>🕒 Wishlist</h2>
        <span class="section-count" id="countNext">0</span>
      </div>
      <div id="nextShelf" class="book-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>✅ Hoàn thành</h2>
        <span class="section-count" id="countFinished">0</span>
      </div>
      <div id="finishedShelf" class="book-grid"></div>
    </section>
  </main>
</div>

<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/vol-list.js"></script>
<script src="js/admin.js"></script>
<script src="js/shell.js"></script>
<script>
const session = requireAuth();
showAdminElements(session, 'adminBtn', 'adminNav');
</script>
<script src="script.js"></script>
</body>
</html>
