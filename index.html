<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý kho sách</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Hamburger (mobile) -->
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <h1>📚 Kho Sách</h1>

    <nav>
      <button class="nav-btn active">Tất cả</button>
      <button class="nav-btn" data-filter="incomplete">Chưa đủ bộ</button>
      <button class="nav-btn" data-filter="complete">Full bộ</button>
    </nav>

    <div class="sidebar-bottom">
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">
        <span class="toggle-icon">🌙</span>
        <span class="toggle-label">Chế độ tối</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">

    <div class="topbar">
      <input type="text" id="searchInput" placeholder="Tìm sách...">
    </div>

    <section>
      <h2>📖 Chưa đủ bộ</h2>
      <div id="readingShelf" class="book-grid"></div>
    </section>

    <section>
      <h2>🕒 Wishlist</h2>
      <div id="nextShelf" class="book-grid"></div>
    </section>

    <section>
      <h2>✅ Hoàn thành</h2>
      <div id="finishedShelf" class="book-grid"></div>
    </section>

  </main>
</div>

<script src="data/books.js"></script>
<script src="script.js"></script>
<script>
/* ===== Dark mode ===== */
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = document.getElementById('darkToggle');
  btn.querySelector('.toggle-icon').textContent = dark ? '☀️' : '🌙';
  btn.querySelector('.toggle-label').textContent = dark ? 'Chế độ sáng' : 'Chế độ tối';
}

function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = !isDark;
  localStorage.setItem('theme', next ? 'dark' : 'light');
  applyTheme(next);
}

// Load saved theme
applyTheme(localStorage.getItem('theme') === 'dark');

/* ===== Mobile sidebar ===== */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) { closeSidebar(); } else {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

// Close sidebar when a nav button is clicked on mobile
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (window.innerWidth <= 768) closeSidebar();
  });
});
</script>
</body>
</html>
