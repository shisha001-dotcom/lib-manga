<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kho Sách</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1>
        <span class="brand-icon">📚</span>
        Kho Sách
      </h1>
      <p>Bộ sưu tập manga</p>
    </div>

    <nav>
      <button class="nav-btn active" data-filter="all">
        📋 Tất cả
      </button>
      <button class="nav-btn" data-filter="incomplete">
        🔖 Chưa đủ bộ
      </button>
      <button class="nav-btn" data-filter="complete">
        ✅ Full bộ
      </button>
      <button class="nav-btn" onclick="window.location.href='stats.html'">
        📊 Thống kê
      </button>
    </nav>

    <div class="sidebar-bottom">
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">
        <span class="toggle-icon">🌙</span>
        <span class="toggle-label">Chế độ tối</span>
      </button>
    </div>
  </aside>

  <main class="main-content">

    <div class="topbar">
      <div class="topbar-title">Thư viện</div>
      <input type="text" id="searchInput" placeholder="🔍 Tìm tên, tác giả...">
    </div>

    <section>
      <div class="section-head">
        <h2>📖 Chưa đủ bộ</h2>
        <span class="section-count" id="countReading">0</span>
      </div>
      <div id="readingShelf" class="book-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>🕒 Wishlist</h2>
        <span class="section-count" id="countNext">0</span>
      </div>
      <div id="nextShelf" class="book-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>✅ Hoàn thành</h2>
        <span class="section-count" id="countFinished">0</span>
      </div>
      <div id="finishedShelf" class="book-grid"></div>
    </section>

  </main>
</div>

<script src="data/books.js"></script>
<script src="script.js"></script>
<script>
/* ===== Dark mode ===== */
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = document.getElementById('darkToggle');
  btn.querySelector('.toggle-icon').textContent = dark ? '☀️' : '🌙';
  btn.querySelector('.toggle-label').textContent = dark ? 'Chế độ sáng' : 'Chế độ tối';
}

function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = !isDark;
  localStorage.setItem('theme', next ? 'dark' : 'light');
  applyTheme(next);
}

applyTheme(localStorage.getItem('theme') === 'dark');

/* ===== Mobile sidebar ===== */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) { closeSidebar(); } else {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (window.innerWidth <= 768) closeSidebar();
  });
});
</script>
</body>
</html>
