<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý kho sách</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h1>📚 Kho Sách</h1>

    <nav>
      <button class="nav-btn active">Tất cả</button>
      <button class="nav-btn" data-filter="incomplete">Chưa đủ bộ</button>
      <button class="nav-btn" data-filter="complete">Full bộ</button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main-content">

    <div class="topbar">
      <input type="text" id="searchInput" placeholder="Tìm sách...">
    </div>

    <!-- Shelf sections -->
    <section>
      <h2>📖 Chưa đủ bộ</h2>
      <div id="readingShelf" class="book-grid"></div>
    </section>

    <section>
      <h2>🕒 Wishlist</h2>
      <div id="nextShelf" class="book-grid"></div>
    </section>

    <section>
      <h2>✅ Hoàn thành</h2>
      <div id="finishedShelf" class="book-grid"></div>
    </section>

  </main>
</div>

<script src="data/books.js"></script>
<script src="script.js"></script>

</body>
</html>
