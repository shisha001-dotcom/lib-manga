<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thống kê — Kho Sách</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div id="appShellTarget"></div>

  <main class="stats-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Thống kê</div>
        <div class="topbar-sub">Tổng quan bộ sưu tập</div>
      </div>
      <div class="topbar-actions">
        <button class="back-btn" onclick="window.location.href='index.html'">← Quay lại</button>
        <button id="adminBtn" class="btn-primary" onclick="openAdminPanel()" style="display:none;">⚙️ Quản lý</button>
      </div>
    </div>

    <div class="stat-cards" id="statCards"></div>

    <div class="shelf-section">
      <div class="section-header">🗂 Phân bổ theo kệ sách</div>
      <div class="shelf-chart" id="shelfChart"></div>
    </div>

    <div class="missing-section">
      <div class="section-header">🛒 Tập đang thiếu</div>
      <div class="missing-list" id="missingList"></div>
    </div>
  </main>
</div>

<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/vol-list.js"></script>
<script src="js/admin.js"></script>
<script src="js/shell.js"></script>
<script>
const session = requireAuth();
showAdminElements(session, 'adminBtn', 'adminNav');
</script>
<script src="data/books.js"></script>
<script src="js/stats.js"></script>
</body>
</html>
