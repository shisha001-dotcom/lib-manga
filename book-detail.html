<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết bộ truyện — Kho Sách</title>
  <link rel="stylesheet" href="style.css">
  <style>
/* ── Vol-list (dạng hàng ngang) ── */
.vol-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.vl-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg);
  transition: border-color 0.15s, background 0.15s;
}
.vl-row.owned {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 6%, transparent);
}
.vl-cover-wrap {
  position: relative;
  flex-shrink: 0;
  width: 42px; height: 58px;
  border-radius: var(--radius-xs);
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-alt);
  user-select: none; -webkit-user-select: none;
}
.vl-cover { width: 100%; height: 100%; object-fit: cover; display: block; }
.vl-cover-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.vl-owned-badge {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900;
  color: var(--accent-text);
  background: rgba(0,0,0,0);
  transition: background 0.15s;
  pointer-events: none;
}
.vl-row.owned .vl-owned-badge { background: color-mix(in srgb, var(--accent) 65%, transparent); }
.vl-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.vl-num  { font-size: 13px; font-weight: 700; color: var(--text); }
.vl-url-row { display: flex; gap: 6px; align-items: center; }
.vl-url-input {
  flex: 1; min-width: 0;
  padding: 6px 10px;
  border: 1.5px solid var(--border); border-radius: var(--radius-xs);
  font-size: 12px; background: var(--surface); color: var(--text);
  outline: none; font-family: inherit; transition: border-color 0.15s;
}
.vl-url-input:focus { border-color: var(--accent); }
.vl-save-btn {
  flex-shrink: 0; padding: 6px 10px;
  border-radius: var(--radius-xs);
  background: var(--accent); color: var(--accent-text);
  border: none; font-size: 13px; cursor: pointer;
  transition: opacity 0.15s; white-space: nowrap;
}
.vl-save-btn:hover   { opacity: 0.85; }
.vl-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.vl-del-btn {
  flex-shrink: 0; width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--red-bg); color: var(--red-fg);
  border: none; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s;
}
.vl-del-btn:hover { opacity: 0.75; }

/* ── Bottom sheet ── */
.sheet-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 400;
  backdrop-filter: blur(2px);
}
.sheet-backdrop.open { display: block; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0; z-index: 500;
  padding: 0 20px 32px;
  max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(.32,1,.42,1);
  box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
}
.bottom-sheet.open { transform: translateY(0); }
.sheet-handle { width:40px;height:4px;background:var(--border);border-radius:4px;margin:14px auto 6px; }
.sheet-header { display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:10px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px; }
.sheet-title  { font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.02em; }
.sheet-sub    { font-size:12px;color:var(--text-3);margin-top:2px; }
.sheet-close  { width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg-alt);font-size:13px;cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.sheet-msg    { display:none;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px; }
.sheet-msg.error   { background:var(--red-bg);  color:var(--red-fg);  display:block; }
.sheet-msg.success { background:var(--green-bg);color:var(--green-fg);display:block; }
.sheet-section-label { font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px; }
.sheet-add-row  { display:flex;gap:10px;margin-bottom:10px; }
.sheet-field    { display:flex;flex-direction:column;gap:5px; }
.sheet-field label { font-size:12px;font-weight:600;color:var(--text-2); }
.sheet-field input { padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font);transition:border-color 0.2s; }
.sheet-field input:focus { border-color:var(--accent); }
.sheet-field:first-child { width:90px;flex-shrink:0; }
.sheet-field-cover { flex:1; }
.sheet-add-btn  { width:100%;padding:13px;font-size:15px;justify-content:center;border-radius:var(--radius-sm); }
.sheet-vol-tip  { font-size:12px;color:var(--text-3);background:var(--bg-alt);padding:8px 10px;border-radius:var(--radius-xs);margin-bottom:12px; }

/* Desktop: sheet → modal */
@media (min-width: 769px) {
  .sheet-backdrop { backdrop-filter: blur(2px); }
  .bottom-sheet {
    bottom:unset;left:50%;top:50%;
    transform:translate(-50%,-40%);
    width:100%;max-width:580px;
    border-radius:20px;max-height:88vh;
    transition:none;opacity:0;pointer-events:none;
  }
  .bottom-sheet.open { transform:translate(-50%,-50%);opacity:1;pointer-events:auto;transition:opacity 0.2s,transform 0.25s cubic-bezier(.34,1.3,.64,1); }
  .sheet-handle { display:none; }
}

@media (max-width: 480px) {
  .vl-url-input { font-size: 13px; padding: 7px 8px; }
  .vl-save-btn  { font-size: 14px; padding: 7px 10px; }
}
  </style>
</head>
<body>

<div class="detail-page">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Quay lại</button>
    <h1 id="bookTitle">Đang tải...</h1>
    <p id="bookProgress"></p>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setFilter('all', this)">
        Tất cả <span id="countAll" class="filter-count">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('owned', this)">
        ✓ Đã có <span id="countOwned" class="filter-count owned">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('missing', this)">
        ✗ Chưa có <span id="countMissing" class="filter-count missing">0</span>
      </button>
    </div>

    <button class="btn-primary detail-add-btn" id="addVolBtn"
      style="display:none; margin-top:14px;" onclick="openAddVolSheet()">
      ＋ Thêm / quản lý tập
    </button>
  </div>

  <section class="detail-grid" id="volumesGrid"></section>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="lightboxPrev(event)">‹</button>
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>
  <button class="lightbox-next" onclick="lightboxNext(event)">›</button>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeAddVolSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div>
      <div class="sheet-title">Quản lý tập</div>
      <div class="sheet-sub" id="sheetSub"></div>
    </div>
    <button class="sheet-close" onclick="closeAddVolSheet()">✕</button>
  </div>

  <div class="sheet-msg" id="sheetMsg"></div>

  <div class="sheet-section-label">Thêm tập mới</div>
  <div class="sheet-add-row">
    <div class="sheet-field">
      <label>Số tập</label>
      <input type="number" id="sheetVolNum" min="1" value="1" inputmode="numeric">
    </div>
    <div class="sheet-field sheet-field-cover">
      <label>URL bìa (tùy chọn)</label>
      <input type="text" id="sheetVolCover" placeholder="https://...">
    </div>
  </div>
  <button class="btn-primary sheet-add-btn" onclick="sheetAddVolume()">＋ Thêm tập</button>

  <div class="sheet-section-label" style="margin-top:20px">Tập hiện có</div>
  <div class="sheet-vol-tip">Nhấn bìa = đổi sở hữu &nbsp;·&nbsp; Sửa URL rồi 💾 = cập nhật bìa &nbsp;·&nbsp; ✕ = xóa tập</div>
  <div class="vol-list" id="sheetVolList"></div>
</div>


<!-- ===== JS (thứ tự quan trọng) ===== -->
<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script>
const session = requireAuth();
const isAdmin = session && (session.role === 'superadmin' || session.role === 'editor');
</script>

<script src="data/books.js"></script>
<script src="js/book-detail.js"></script>
</body>
</html>
