<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết bộ truyện</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="detail-page">

  <header class="detail-header">
    <button onclick="goBack()">← Quay lại</button>
    <h1 id="bookTitle">Tên bộ truyện</h1>
    <p id="bookProgress">0/0 tập</p>
  </header>

  <section class="detail-grid" id="volumesGrid">
    <!-- render bằng JS -->
  </section>

</div>

<script src="data/books.js"></script>
<script>
/* ===== Lấy id từ URL ===== */
const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

const book = books.find(b => b.id === bookId);

const titleEl = document.getElementById("bookTitle");
const progressEl = document.getElementById("bookProgress");
const gridEl = document.getElementById("volumesGrid");

if (!book) {
  titleEl.innerText = "Không tìm thấy bộ truyện";
} else {
  titleEl.innerText = book.title;
  progressEl.innerText = `${book.owned}/${book.total} tập`;

  renderVolumes(book);
}

/* ===== Render tập truyện ===== */
function renderVolumes(book) {
  gridEl.innerHTML = "";

  book.volumes.forEach(volume => {
    const card = document.createElement("div");
    card.className = "volume-card";

    if (!volume.owned) {
      card.classList.add("missing");
    }

    card.innerHTML = `
      <div class="volume-cover" style="background-image:url('${volume.cover}')">
        ${
          volume.owned
            ? `<div class="owned-check">✓</div>`
            : ""
        }
      </div>

      <div class="volume-number">
        Tập ${volume.number}
      </div>
    `;

    gridEl.appendChild(card);
  });
}

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
